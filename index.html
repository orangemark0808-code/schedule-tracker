<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール時間管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #fff5f9; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.25rem; padding-top: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #c2628a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #888; }
.toggle-bar { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; }
.toggle-btn { font-size: 12px; background: #fce8f0; color: #99355a; border: 1px solid #f4c0d1; border-radius: 8px; padding: 5px 12px; cursor: pointer; }
.total-card { background: #fce8f0; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.total-label { font-size: 13px; color: #99355a; }
.total-value { font-size: 24px; font-weight: 600; color: #72243e; }
.total-unit { font-size: 13px; color: #99355a; margin-left: 4px; }
.session { background: #fff; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.75rem; }
.session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
.session-title { font-size: 13px; font-weight: 600; color: #99355a; background: #fce8f0; border-radius: 8px; padding: 3px 10px; }
.duration-badge { font-size: 15px; color: #72243e; font-weight: 600; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; }
.field { display: flex; flex-direction: column; gap: 3px; }
.field label { font-size: 11px; color: #888; }
.field input[type="time"] { width: 100%; border: 1px solid #f4c0d1; border-radius: 8px; padding: 8px; font-size: 16px; color: #333; background: #fff; -webkit-appearance: none; }
.field input[type="time"]:focus { outline: none; border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0; }
.interval-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.interval-row label { font-size: 12px; color: #888; white-space: nowrap; }
.interval-row input[type="number"] { width: 70px; border: 1px solid #f4c0d1; border-radius: 8px; padding: 6px 8px; font-size: 15px; color: #333; background: #fff; -webkit-appearance: none; }
.next-start { font-size: 12px; color: #d4537e; }
.session-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
.btn-next { font-size: 13px; color: #d4537e; border: none; background: transparent; cursor: pointer; padding: 0; }
.btn-delete { font-size: 12px; color: #aaa; border: none; background: transparent; cursor: pointer; padding: 0; }
.add-btn { width: 100%; margin-top: 0.25rem; padding: 12px; border: 1.5px dashed #f4c0d1; border-radius: 12px; background: transparent; color: #d4537e; font-size: 15px; cursor: pointer; }
.clear-btn { width: 100%; margin-top: 0.5rem; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: transparent; color: #aaa; font-size: 13px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>スケジュール時間管理</h1>
    <p>開始・終了時刻を入力すると自動計算します</p>
  </div>
  <div class="toggle-bar">
    <button class="toggle-btn" onclick="toggleTotal()">合計時間を非表示</button>
  </div>
  <div class="total-card" id="totalCard">
    <span class="total-label">合計時間</span>
    <div>
      <span class="total-value" id="totalMin">0</span>
      <span class="total-unit">分</span>
      <span style="font-size:13px;color:#99355a;margin-left:6px;" id="totalHour"></span>
    </div>
  </div>
  <div id="sessions"></div>
  <button class="add-btn" onclick="addSession()">＋ セッションを追加</button>
  <button class="clear-btn" onclick="clearAll()">すべてリセット</button>
</div>
<script>
let sessions = [];
let showTotal = true;
function pad(n){return String(n).padStart(2,'0');}
function parseTime(str){
  if(!str)return null;
  const m=str.match(/^(\d{1,2}):(\d{2})$/);
  if(!m)return null;
  return parseInt(m[1])*60+parseInt(m[2]);
}
function minToStr(totalMin){
  if(totalMin===null||totalMin<0)return'';
  return pad(Math.floor(totalMin/60))+':'+pad(totalMin%60);
}
function minutesToHM(min){
  if(min<=0)return'';
  const h=Math.floor(min/60),m=min%60;
  if(h===0)return'';
  return'('+h+'時間'+(m>0?m+'分':'')+ ')';
}
function addSession(preStart){
  sessions.push({start:preStart||'',end:'',interval:'5'});
  render();
}
function removeSession(i){sessions.splice(i,1);render();}
function update(i,field,val){sessions[i][field]=val;render();}
function addNext(i){
  const s=sessions[i];
  const e=parseTime(s.end);
  const iv=parseInt(s.interval)||0;
  if(e!==null){addSession(minToStr(e+iv));}else{addSession();}
}
function render(){
  const container=document.getElementById('sessions');
  container.innerHTML='';
  let grand=0;
  sessions.forEach((s,i)=>{
    const sm=parseTime(s.start),em=parseTime(s.end);
    const dur=(sm!==null&&em!==null&&em>sm)?em-sm:null;
    if(dur!==null)grand+=dur;
    const ns=(em!==null&&s.interval&&parseInt(s.interval)>=0)?minToStr(em+parseInt(s.interval)):'';
    const isLast=i===sessions.length-1;
    const div=document.createElement('div');
    div.className='session';
    div.innerHTML=`
      <div class="session-header">
        <span class="session-title">セッション ${i+1}</span>
        <span class="duration-badge">${dur!==null?dur+'分':'—'}</span>
      </div>
      <div class="row">
        <div class="field"><label>開始時刻</label>
          <input type="time" value="${s.start}" oninput="update(${i},'start',this.value)"></div>
        <div class="field"><label>終了時刻</label>
          <input type="time" value="${s.end}" oninput="update(${i},'end',this.value)"></div>
      </div>
      <div class="interval-row">
        <label>インターバル(分)</label>
        <input type="number" min="0" value="${s.interval}" oninput="update(${i},'interval',this.value)">
        ${ns?`<span class="next-start">次の開始: ${ns}</span>`:''}
      </div>
      <div class="session-footer">
        ${isLast?`<button class="btn-next" onclick="addNext(${i})">次のセッションを追加 →</button>`:'<span></span>'}
        <button class="btn-delete" onclick="removeSession(${i})">削除</button>
      </div>`;
    container.appendChild(div);
  });
  document.getElementById('totalMin').textContent=grand;
  document.getElementById('totalHour').textContent=minutesToHM(grand);
}
function toggleTotal(){
  showTotal=!showTotal;
  document.getElementById('totalCard').style.display=showTotal?'flex':'none';
  document.querySelector('.toggle-btn').textContent=showTotal?'合計時間を非表示':'合計時間を表示';
}
function clearAll(){sessions=[];render();}
addSession();addSession();render();
</script>
</body>
</html>
