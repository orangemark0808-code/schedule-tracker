<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール時間管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #fff5f9; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.25rem; padding-top: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #c2628a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #999; }
.session { background: #fff; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.75rem; }
.session-header { display: flex; align-items: center; margin-bottom: 0.75rem; }
.session-title { font-size: 14px; font-weight: 600; color: #99355a; background: #fce8f0; border-radius: 8px; padding: 3px 10px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: #444; font-weight: 500; }
.field input[type="text"] { width: 100%; border: 1px solid #f4c0d1; border-radius: 8px; padding: 10px 8px; font-size: 20px; font-weight: 600; color: #111; background: #fff; -webkit-appearance: none; appearance: none; text-align: center; }
.field input[type="text"]::placeholder { color: #bbb; font-weight: 400; font-size: 15px; }
.field input[type="text"].auto-filled { background: #fdf4f8; color: #c2628a; }
.field input[type="text"]:focus { outline: none; border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0; }
.field input[type="text"].error { border-color: #e24b4a; }
.field input[type="number"] { width: 100%; border: 1px solid #f4c0d1; border-radius: 8px; padding: 10px 8px; font-size: 20px; font-weight: 600; color: #111; background: #fff; -webkit-appearance: none; appearance: none; text-align: center; }
.field input[type="number"]::placeholder { color: #bbb; font-weight: 400; font-size: 15px; }
.field input[type="number"]:focus { outline: none; border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0; }
.end-row { background: #fdf4f8; border: 1px solid #f4c0d1; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.end-label { font-size: 13px; color: #99355a; font-weight: 500; }
.end-time { font-size: 24px; font-weight: 700; color: #72243e; }
.session-footer { display: flex; justify-content: flex-end; }
.btn-delete { font-size: 12px; color: #bbb; border: none; background: transparent; cursor: pointer; padding: 4px 8px; }
.add-btn { width: 100%; margin-top: 0.25rem; padding: 14px; border: 1.5px dashed #f4c0d1; border-radius: 12px; background: transparent; color: #d4537e; font-size: 16px; cursor: pointer; }
.clear-btn { width: 100%; margin-top: 0.5rem; margin-bottom: 2rem; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: transparent; color: #aaa; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>スケジュール時間管理</h1>
    <p>開始時刻と経過時間（分）を入力してください</p>
  </div>
  <div id="sessions"></div>
  <button class="add-btn" onclick="manualAdd()">＋ セッションを手動追加</button>
  <button class="clear-btn" onclick="clearAll()">すべてリセット</button>
</div>
<script>
let sessions = [];

function pad(n) { return String(n).padStart(2, '0'); }

function parseTime(str) {
  if (!str) return null;
  const s = str.replace(/[^\d:]/g, '');
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h > 23 || min > 59) return null;
  return h * 60 + min;
}

function minToStr(totalMin) {
  if (totalMin === null) return '';
  const h = Math.floor(totalMin / 60) % 24;
  return pad(h) + ':' + pad(totalMin % 60);
}

function calcEndMin(s) {
  const sm = parseTime(s.start);
  const elapsed = parseInt(s.elapsed);
  if (sm === null || isNaN(elapsed) || elapsed <= 0) return null;
  return sm + elapsed;
}

function calcNextStart(i) {
  const end = calcEndMin(sessions[i]);
  const iv = parseInt(sessions[i].interval) || 0;
  return end !== null ? minToStr(end + iv) : '';
}

function newSession(preStart) {
  return { start: preStart || '', elapsed: '', interval: '5' };
}

function init() {
  sessions = [newSession(), newSession()];
  render();
}

function manualAdd() {
  const nextStart = sessions.length > 0 ? calcNextStart(sessions.length - 1) : '';
  sessions.push(newSession(nextStart));
  render();
}

function removeSession(i) {
  sessions.splice(i, 1);
  render();
}

function updateField(i, field, val) {
  sessions[i][field] = val;
  propagateStartTimes(i);
  if (field === 'elapsed' && i === sessions.length - 1) {
    if (calcEndMin(sessions[i]) !== null) {
      sessions.push(newSession(calcNextStart(i)));
    }
  }
  render();
}

function propagateStartTimes(fromIndex) {
  for (let j = fromIndex; j < sessions.length - 1; j++) {
    const ns = calcNextStart(j);
    if (ns) sessions[j + 1].start = ns;
  }
}

function onTimeInput(i, el) {
  let raw = el.value.replace(/[^\d]/g, '');
  if (raw.length >= 3) raw = raw.slice(0, 2) + ':' + raw.slice(2, 4);
  el.value = raw;
  const parsed = parseTime(raw);
  if (parsed !== null || raw === '') {
    el.classList.remove('error');
    updateField(i, 'start', raw);
    if (parsed !== null && raw.length === 5) {
      setTimeout(() => {
        const next = document.getElementById('f-' + i + '-elapsed');
        if (next) next.focus();
      }, 50);
    }
  } else {
    el.classList.add('error');
  }
}

function render() {
  const container = document.getElementById('sessions');
  const focusedId = document.activeElement ? document.activeElement.id : null;
  const scrollY = window.scrollY;
  container.innerHTML = '';

  sessions.forEach((s, i) => {
    const endMin = calcEndMin(s);
    const isAutoStart = i > 0;

    const div = document.createElement('div');
    div.className = 'session';
    div.innerHTML = `
      <div class="session-header">
        <span class="session-title">セッション ${i + 1}</span>
      </div>
      <div class="row3">
        <div class="field">
          <label>開始時刻${isAutoStart ? '（自動）' : ''}</label>
          <input id="f-${i}-start" type="text" inputmode="numeric" placeholder="0855"
            value="${s.start}" class="${isAutoStart ? 'auto-filled' : ''}"
            ${isAutoStart ? 'readonly' : ''}
            oninput="onTimeInput(${i},this)">
        </div>
        <div class="field">
          <label>経過時間（分）</label>
          <input id="f-${i}-elapsed" type="number" inputmode="numeric" min="1"
            placeholder="00" value="${s.elapsed}"
            oninput="updateField(${i},'elapsed',this.value)">
        </div>
        <div class="field">
          <label>インターバル(分)</label>
          <input id="f-${i}-interval" type="number" inputmode="numeric" min="0"
            placeholder="5" value="${s.interval}"
            oninput="updateField(${i},'interval',this.value)">
        </div>
      </div>
      <div class="end-row">
        <span class="end-label">終了時刻</span>
        <span class="end-time">${endMin !== null ? minToStr(endMin) : '—'}</span>
      </div>
      <div class="session-footer">
        <button class="btn-delete" onclick="removeSession(${i})">削除</button>
      </div>
    `;
    container.appendChild(div);
  });

  if (focusedId) { const el = document.getElementById(focusedId); if (el) el.focus(); }
  window.scrollTo(0, scrollY);
}

function clearAll() { sessions = [newSession(), newSession()]; render(); }

init();
</script>
</body>
</html>
