<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール時間管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
input { border: none !important; outline: none !important; box-shadow: none !important; -webkit-appearance: none !important; appearance: none !important; background: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #fff5f9; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.25rem; padding-top: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #c2628a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #999; margin-bottom: 2px; }
.session { background: #fff; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.75rem; }
.session-header { display: flex; align-items: center; margin-bottom: 0.75rem; }
.session-title { font-size: 14px; font-weight: 600; color: #99355a; background: #fce8f0; border-radius: 8px; padding: 3px 10px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: #444; font-weight: 500; }
.cell {
  width: 100%; border: 1px solid #f4c0d1; border-radius: 8px;
  background: #fff;
  height: 56px; display: flex; align-items: center; justify-content: center;
}
.cell input {
  width: 100%; height: 100%;
  font-size: 24px !important; font-weight: 600; color: #111;
  text-align: center; padding: 0; margin: 0;
}
.cell input::placeholder { color: #bbb; font-weight: 400; font-size: 15px !important; }
.cell.end-cell { background: #fdf4f8; font-size: 24px; font-weight: 600; color: #72243e; }
.cell:focus-within { border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0 !important; }
.session-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
.hint-text { font-size: 11px; color: #bbb; flex: 1; }
.btn-delete { font-size: 12px; color: #bbb; border: none; background: transparent; cursor: pointer; padding: 4px 8px; white-space: nowrap; }
.add-btn { width: 100%; margin-top: 0.25rem; padding: 14px; border: 1.5px dashed #f4c0d1; border-radius: 12px; background: transparent; color: #d4537e; font-size: 16px; cursor: pointer; }
.clear-btn { width: 100%; margin-top: 0.5rem; margin-bottom: 2rem; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: transparent; color: #aaa; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>スケジュール時間管理</h1>
    <p>開始時刻とケア時間（分）を入力してください</p>
    <p>ケア時間（分）はランダムで表示されます</p>
  </div>
  <div id="sessions"></div>
  <button class="add-btn" onclick="manualAdd()">＋ セッションを手動追加</button>
  <button class="clear-btn" onclick="clearAll()">すべてリセット</button>
</div>
<script>
let sessions = [];
let elapsedHistory = [];

function pad(n) { return String(n).padStart(2, '0'); }

function randomElapsed() {
  let val;
  do {
    val = String(Math.floor(Math.random() * 6) + 20);
  } while (
    elapsedHistory.length >= 2 &&
    elapsedHistory[elapsedHistory.length - 1] === val &&
    elapsedHistory[elapsedHistory.length - 2] === val
  );
  elapsedHistory.push(val);
  if (elapsedHistory.length > 2) elapsedHistory.shift();
  return val;
}

function parseTime(str) {
  if (!str) return null;
  const m = str.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h > 23 || min > 59) return null;
  return h * 60 + min;
}

function minToStr(totalMin) {
  if (totalMin === null) return '';
  return pad(Math.floor(totalMin / 60) % 24) + ':' + pad(totalMin % 60);
}

function calcEndMin(s) {
  const sm = parseTime(s.start);
  const el = parseInt(s.elapsed);
  if (sm === null || isNaN(el) || el <= 0) return null;
  return sm + el;
}

function calcNextStart(i) {
  const end = calcEndMin(sessions[i]);
  const iv = parseInt(sessions[i].interval) || 0;
  return end !== null ? minToStr(end + iv) : '';
}

function newSession(preStart) {
  return { start: preStart || '', elapsed: randomElapsed(), interval: '5' };
}

function init() {
  elapsedHistory = [];
  sessions = [newSession(), newSession()];
  render();
}

function manualAdd() {
  const nextStart = sessions.length > 0 ? calcNextStart(sessions.length - 1) : '';
  sessions.push(newSession(nextStart));
  render();
}

function removeSession(i) {
  sessions.splice(i, 1);
  render();
}

function updateEndBadge(i) {
  const endMin = calcEndMin(sessions[i]);
  const badge = document.getElementById('end-' + i);
  if (badge) badge.textContent = endMin !== null ? minToStr(endMin) : '—';
}

function updateNextStart(i) {
  for (let j = i; j < sessions.length - 1; j++) {
    const ns = calcNextStart(j);
    if (ns) {
      sessions[j + 1].start = ns;
      const el = document.getElementById('f-' + (j + 1) + '-start');
      if (el) el.value = ns;
    }
    updateEndBadge(j + 1);
  }
}

function onTimeInput(i, el) {
  let raw = el.value.replace(/[^\d]/g, '');
  if (raw.length >= 3) raw = raw.slice(0, 2) + ':' + raw.slice(2, 4);
  el.value = raw;
  const parsed = parseTime(raw);
  if (parsed !== null || raw === '') {
    sessions[i].start = raw;
    updateEndBadge(i);
    updateNextStart(i);
    if (parsed !== null && raw.length === 5) {
      setTimeout(() => {
        const next = document.getElementById('f-' + i + '-elapsed');
        if (next) next.focus();
      }, 50);
    }
  }
}

function onElapsedInput(i, el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw;
  sessions[i].elapsed = raw;
  updateEndBadge(i);
  updateNextStart(i);
}

function onIntervalFocus(i) {
  if (i === sessions.length - 1 && calcEndMin(sessions[i]) !== null) {
    sessions.push(newSession(calcNextStart(i)));
    render();
  }
}

function onIntervalInput(i, el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw;
  sessions[i].interval = raw;
  updateNextStart(i);
}

function render() {
  const container = document.getElementById('sessions');
  container.innerHTML = '';
  sessions.forEach((s, i) => {
    const endMin = calcEndMin(s);
    const isAutoStart = i > 0;
    const isLast = i === sessions.length - 1;

    const div = document.createElement('div');
    div.className = 'session';
    div.innerHTML = `
      <div class="session-header">
        <span class="session-title">セッション ${i + 1}</span>
      </div>
      <div class="row2">
        <div class="field">
          <label>開始時刻${isAutoStart ? '（自動）' : ''}</label>
          <div class="cell">
            <input id="f-${i}-start" type="text" inputmode="numeric" placeholder="0855"
              value="${s.start}" ${isAutoStart ? 'readonly' : ''}
              oninput="onTimeInput(${i},this)">
          </div>
        </div>
        <div class="field">
          <label>終了時刻</label>
          <div class="cell end-cell" id="end-${i}">${endMin !== null ? minToStr(endMin) : '—'}</div>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>ケア時間（分）</label>
          <div class="cell">
            <input id="f-${i}-elapsed" type="text" inputmode="numeric"
              value="${s.elapsed}" oninput="onElapsedInput(${i},this)">
          </div>
        </div>
        <div class="field">
          <label>インターバル(分)</label>
          <div class="cell">
            <input id="f-${i}-interval" type="text" inputmode="numeric" placeholder="5"
              value="${s.interval}"
              onfocus="onIntervalFocus(${i})"
              oninput="onIntervalInput(${i},this)">
          </div>
        </div>
      </div>
      <div class="session-footer">
        ${isAutoStart && isLast ? `<span class="hint-text">ケア時間（分）を入力後インターバル（分）をタップすると次のセッションが追加されます</span>` : '<span></span>'}
        <button class="btn-delete" onclick="removeSession(${i})">削除</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function clearAll() {
  elapsedHistory = [];
  sessions = [newSession(), newSession()];
  render();
}

init();
</script>
</body>
</html>
