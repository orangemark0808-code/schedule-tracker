<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール時間管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #fff5f9; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.25rem; padding-top: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #c2628a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #999; }
.toggle-bar { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; }
.toggle-btn { font-size: 12px; background: #fce8f0; color: #99355a; border: 1px solid #f4c0d1; border-radius: 8px; padding: 5px 12px; cursor: pointer; }
.total-card { background: #fce8f0; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.total-label { font-size: 13px; color: #99355a; }
.total-value { font-size: 24px; font-weight: 600; color: #72243e; }
.total-unit { font-size: 13px; color: #99355a; margin-left: 4px; }
.session { background: #fff; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.75rem; }
.session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
.session-title { font-size: 14px; font-weight: 600; color: #99355a; background: #fce8f0; border-radius: 8px; padding: 3px 10px; }
.duration-badge { font-size: 18px; color: #111; font-weight: 700; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 6px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 13px; color: #444; font-weight: 500; }
.field input[type="text"] { width: 100%; border: 1px solid #f4c0d1; border-radius: 8px; padding: 10px 10px; font-size: 22px; font-weight: 600; color: #111; background: #fff; -webkit-appearance: none; appearance: none; }
.field input[type="text"]::placeholder { color: #999; font-weight: 400; font-size: 18px; }
.field input[type="text"].auto-filled { background: #fdf4f8; color: #c2628a; }
.field input[type="text"]:focus { outline: none; border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0; }
.field input[type="text"].error { border-color: #e24b4a; }
.interval-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.interval-row label { font-size: 13px; color: #444; font-weight: 500; white-space: nowrap; }
.interval-row input[type="number"] { width: 75px; border: 1px solid #f4c0d1; border-radius: 8px; padding: 8px 8px; font-size: 20px; font-weight: 600; color: #111; background: #fff; -webkit-appearance: none; appearance: none; }
.interval-row input[type="number"]:focus { outline: none; border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0; }
.session-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
.btn-delete { font-size: 13px; color: #bbb; border: none; background: transparent; cursor: pointer; padding: 4px 8px; }
.add-btn { width: 100%; margin-top: 0.25rem; padding: 14px; border: 1.5px dashed #f4c0d1; border-radius: 12px; background: transparent; color: #d4537e; font-size: 16px; cursor: pointer; }
.clear-btn { width: 100%; margin-top: 0.5rem; margin-bottom: 2rem; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: transparent; color: #aaa; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>スケジュール時間管理</h1>
    <p>時刻は HHMM 形式で入力してください</p>
  </div>
  <div class="toggle-bar">
    <button class="toggle-btn" onclick="toggleTotal()">合計時間を非表示</button>
  </div>
  <div class="total-card" id="totalCard">
    <span class="total-label">合計時間</span>
    <div>
      <span class="total-value" id="totalMin">0</span>
      <span class="total-unit">分</span>
      <span style="font-size:13px;color:#99355a;margin-left:6px;" id="totalHour"></span>
    </div>
  </div>
  <div id="sessions"></div>
  <button class="add-btn" onclick="manualAdd()">＋ セッションを手動追加</button>
  <button class="clear-btn" onclick="clearAll()">すべてリセット</button>
</div>
<script>
let sessions = [];
let showTotal = true;

function pad(n) { return String(n).padStart(2, '0'); }

function parseTime(str) {
  if (!str) return null;
  const s = str.replace(/[^\d:]/g, '');
  const m = s.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h > 23 || min > 59) return null;
  return h * 60 + min;
}

function minToStr(totalMin) {
  if (totalMin === null) return '';
  const h = Math.floor(totalMin / 60) % 24;
  return pad(h) + ':' + pad(totalMin % 60);
}

function minutesToHM(min) {
  if (min <= 0) return '';
  const h = Math.floor(min / 60), m = min % 60;
  if (h === 0) return '';
  return '(' + h + '時間' + (m > 0 ? m + '分' : '') + ')';
}

function calcNextStart(i) {
  const s = sessions[i];
  const em = parseTime(s.end);
  const iv = parseInt(s.interval) || 0;
  return (em !== null) ? minToStr(em + iv) : '';
}

function newSession(preStart) {
  return { start: preStart || '', end: '', interval: '5' };
}

function init() {
  sessions = [newSession(), newSession()];
  render();
}

function manualAdd() {
  const last = sessions.length > 0 ? sessions[sessions.length - 1] : null;
  const nextStart = last ? calcNextStart(sessions.length - 1) : '';
  sessions.push(newSession(nextStart));
  render();
}

function removeSession(i) {
  sessions.splice(i, 1);
  render();
}

function updateField(i, field, val) {
  sessions[i][field] = val;
  if (field === 'end' || field === 'interval') propagateStartTimes(i);
  if (field === 'end' && val && parseTime(val) !== null) {
    if (i === sessions.length - 1) {
      sessions.push(newSession(calcNextStart(i)));
    }
  }
  render();
}

function propagateStartTimes(fromIndex) {
  for (let j = fromIndex; j < sessions.length - 1; j++) {
    const ns = calcNextStart(j);
    if (ns) sessions[j + 1].start = ns;
  }
}

function onTimeInput(i, field, el) {
  let raw = el.value.replace(/[^\d]/g, '');
  if (raw.length >= 3) raw = raw.slice(0, 2) + ':' + raw.slice(2, 4);
  el.value = raw;

  const parsed = parseTime(raw);
  if (parsed !== null || raw === '') {
    el.classList.remove('error');
    updateField(i, field, raw);

    // 4桁入力完了（HH:MM形式になった）時に次のフィールドへ自動移動
    if (parsed !== null && raw.length === 5) {
      let nextEl = null;
      if (field === 'start') {
        nextEl = document.getElementById('f-' + i + '-end');
      } else if (field === 'end') {
        nextEl = document.getElementById('f-' + i + '-interval');
      }
      if (nextEl) {
        setTimeout(() => nextEl.focus(), 50);
      }
    }
  } else {
    el.classList.add('error');
  }
}

function render() {
  const container = document.getElementById('sessions');
  const focusedId = document.activeElement ? document.activeElement.id : null;
  const scrollY = window.scrollY;
  container.innerHTML = '';
  let grand = 0;

  sessions.forEach((s, i) => {
    const sm = parseTime(s.start);
    const em = parseTime(s.end);
    const dur = (sm !== null && em !== null && em > sm) ? em - sm : null;
    if (dur !== null) grand += dur;
    const isAutoStart = i > 0;

    const div = document.createElement('div');
    div.className = 'session';
    div.innerHTML = `
      <div class="session-header">
        <span class="session-title">セッション ${i + 1}</span>
        <span class="duration-badge">${dur !== null ? dur + '分' : ''}</span>
      </div>
      <div class="row">
        <div class="field">
          <label>開始時刻${isAutoStart ? '（自動）' : ''}</label>
          <input id="f-${i}-start" type="text" inputmode="numeric" placeholder="0855"
            value="${s.start}" class="${isAutoStart ? 'auto-filled' : ''}"
            ${isAutoStart ? 'readonly' : ''}
            oninput="onTimeInput(${i},'start',this)">
        </div>
        <div class="field">
          <label>終了時刻</label>
          <input id="f-${i}-end" type="text" inputmode="numeric" placeholder="1025"
            value="${s.end}" oninput="onTimeInput(${i},'end',this)">
        </div>
      </div>
      <div class="interval-row">
        <label>インターバル(分)</label>
        <input id="f-${i}-interval" type="number" inputmode="numeric" min="0"
          value="${s.interval}" oninput="updateField(${i},'interval',this.value)">
      </div>
      <div class="session-footer">
        <button class="btn-delete" onclick="removeSession(${i})">削除</button>
      </div>
    `;
    container.appendChild(div);
  });

  document.getElementById('totalMin').textContent = grand;
  document.getElementById('totalHour').textContent = minutesToHM(grand);
  if (focusedId) { const el = document.getElementById(focusedId); if (el) el.focus(); }
  window.scrollTo(0, scrollY);
}

function toggleTotal() {
  showTotal = !showTotal;
  document.getElementById('totalCard').style.display = showTotal ? 'flex' : 'none';
  document.querySelector('.toggle-btn').textContent = showTotal ? '合計時間を非表示' : '合計時間を表示';
}

function clearAll() { sessions = [newSession(), newSession()]; render(); }

init();
</script>
</body>
</html>
