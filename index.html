<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スケジュール時間管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
input { border: none !important; outline: none !important; box-shadow: none !important; -webkit-appearance: none !important; appearance: none !important; background: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #fff5f9; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 1rem; }
.header { text-align: center; margin-bottom: 1rem; padding-top: 0.5rem; }
.header h1 { font-size: 20px; font-weight: 600; color: #c2628a; margin-bottom: 4px; }
.header p { font-size: 13px; color: #999; margin-bottom: 2px; }
.top-card { background: #fce8f0; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.75rem 1rem; margin-bottom: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.top-field { display: flex; flex-direction: column; gap: 4px; }
.top-field label { font-size: 12px; color: #99355a; font-weight: 500; }
.top-cell { background: #fff; border: 1px solid #f4c0d1; border-radius: 8px; height: 52px; display: flex; align-items: center; justify-content: center; }
.top-cell input { font-size: 24px !important; font-weight: 600; color: #111; text-align: center; width: 100%; height: 100%; padding: 0; margin: 0; }
.top-cell input::placeholder { color: #bbb; font-weight: 400; font-size: 15px !important; }
.top-cell:focus-within { border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0 !important; }
.session { background: #fff; border: 1px solid #f4c0d1; border-radius: 12px; padding: 0.9rem 1rem; margin-bottom: 0.75rem; }
.session-header { display: flex; align-items: center; margin-bottom: 0.75rem; }
.session-title { font-size: 14px; font-weight: 600; color: #99355a; background: #fce8f0; border-radius: 8px; padding: 3px 10px; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: #444; font-weight: 500; }
.cell { width: 100%; border: 1px solid #f4c0d1; border-radius: 8px; background: #fff; height: 56px; display: flex; align-items: center; justify-content: center; }
.cell input { width: 100%; height: 100%; font-size: 24px !important; font-weight: 600; color: #111; text-align: center; padding: 0; margin: 0; }
.cell input::placeholder { color: #bbb; font-weight: 400; font-size: 15px !important; }
.cell.end-cell { background: #fdf4f8; font-size: 24px; font-weight: 600; color: #72243e; }
.cell:focus-within { border-color: #d4537e; box-shadow: 0 0 0 3px #fce8f0 !important; }
.session-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 4px; }
.btn-delete { font-size: 12px; color: #bbb; border: none; background: transparent; cursor: pointer; padding: 4px 8px; white-space: nowrap; }
.add-btn { width: 100%; margin-top: 0.25rem; padding: 14px; border: 1.5px dashed #f4c0d1; border-radius: 12px; background: transparent; color: #d4537e; font-size: 16px; cursor: pointer; }
.clear-btn { width: 100%; margin-top: 0.5rem; margin-bottom: 2rem; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: transparent; color: #aaa; font-size: 14px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>スケジュール時間管理</h1>
    <p>人数と開始時刻を入力してください</p>
    <p>ケア時間（分）はランダムで表示されます</p>
  </div>
  <div class="top-card">
    <div class="top-field">
      <label>人数</label>
      <div class="top-cell">
        <input id="numPeople" type="text" inputmode="numeric" placeholder="5" oninput="onPeopleInput(this)">
      </div>
    </div>
    <div class="top-field">
      <label>開始時刻</label>
      <div class="top-cell">
        <input id="startTime" type="text" inputmode="numeric" placeholder="0855" oninput="onStartTimeInput(this)">
      </div>
    </div>
  </div>
  <div id="sessions"></div>
  <button class="add-btn" onclick="manualAdd()">＋ セッションを手動追加</button>
  <button class="clear-btn" onclick="clearAll()">すべてリセット</button>
</div>
<script>
let sessions = [];
let elapsedHistory = [];
let numPeople = 0;
let globalStart = '';
let nextId = 1;

function pad(n) { return String(n).padStart(2, '0'); }

function randomElapsed() {
  let val;
  do {
    val = String(Math.floor(Math.random() * 6) + 20);
  } while (
    elapsedHistory.length >= 2 &&
    elapsedHistory[elapsedHistory.length - 1] === val &&
    elapsedHistory[elapsedHistory.length - 2] === val
  );
  elapsedHistory.push(val);
  if (elapsedHistory.length > 2) elapsedHistory.shift();
  return val;
}

function parseTime(str) {
  if (!str) return null;
  const m = str.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return null;
  const h = parseInt(m[1]), min = parseInt(m[2]);
  if (h > 23 || min > 59) return null;
  return h * 60 + min;
}

function minToStr(totalMin) {
  if (totalMin === null) return '';
  return pad(Math.floor(totalMin / 60) % 24) + ':' + pad(totalMin % 60);
}

function calcEndMin(s) {
  const sm = parseTime(s.start);
  const el = parseInt(s.elapsed);
  if (sm === null || isNaN(el) || el <= 0) return null;
  return sm + el;
}

function calcNextStart(s) {
  const end = calcEndMin(s);
  const iv = parseInt(s.interval) || 0;
  return end !== null ? minToStr(end + iv) : '';
}

function newSession(preStart) {
  return { id: nextId++, start: preStart || '', elapsed: randomElapsed(), interval: '5' };
}

function generateSessions() {
  if (numPeople <= 0 || !parseTime(globalStart)) return;
  elapsedHistory = [];
  sessions = [];
  nextId = 1;
  let start = globalStart;
  for (let i = 0; i < numPeople; i++) {
    const s = newSession(start);
    sessions.push(s);
    const end = calcEndMin(s);
    const iv = parseInt(s.interval) || 0;
    start = end !== null ? minToStr(end + iv) : '';
  }
  render();
}

function onPeopleInput(el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw;
  numPeople = parseInt(raw) || 0;
  generateSessions();
}

function onStartTimeInput(el) {
  let raw = el.value.replace(/[^\d]/g, '');
  if (raw.length >= 3) raw = raw.slice(0, 2) + ':' + raw.slice(2, 4);
  el.value = raw;
  const parsed = parseTime(raw);
  if (parsed !== null) {
    globalStart = raw;
    generateSessions();
  } else {
    globalStart = '';
  }
}

function manualAdd() {
  const last = sessions.length > 0 ? sessions[sessions.length - 1] : null;
  const nextStart = last ? calcNextStart(last) : globalStart;
  sessions.push(newSession(nextStart));
  render();
}

function removeSession(id) {
  sessions = sessions.filter(s => s.id !== id);
  render();
}

function updateEndBadge(idx) {
  const s = sessions[idx];
  const endMin = calcEndMin(s);
  const badge = document.getElementById('end-' + s.id);
  if (badge) badge.textContent = endMin !== null ? minToStr(endMin) : '—';
}

function onElapsedInput(id, el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw;
  const idx = sessions.findIndex(s => s.id === id);
  if (idx < 0) return;
  sessions[idx].elapsed = raw;
  updateEndBadge(idx);
}

function onIntervalInput(id, el) {
  const raw = el.value.replace(/[^\d]/g, '');
  el.value = raw;
  const idx = sessions.findIndex(s => s.id === id);
  if (idx < 0) return;
  sessions[idx].interval = raw;
}

function onStartEdit(id, el) {
  let raw = el.value.replace(/[^\d]/g, '');
  if (raw.length >= 3) raw = raw.slice(0, 2) + ':' + raw.slice(2, 4);
  el.value = raw;
  const idx = sessions.findIndex(s => s.id === id);
  if (idx < 0) return;
  sessions[idx].start = raw;
  updateEndBadge(idx);
}

function render() {
  const container = document.getElementById('sessions');
  container.innerHTML = '';
  sessions.forEach((s, i) => {
    const endMin = calcEndMin(s);
    const div = document.createElement('div');
    div.className = 'session';
    div.innerHTML = `
      <div class="session-header">
        <span class="session-title">セッション ${s.id}</span>
      </div>
      <div class="row2">
        <div class="field">
          <label>開始時刻${i > 0 ? '（自動）' : ''}</label>
          <div class="cell">
            <input type="text" inputmode="numeric" placeholder="0855"
              value="${s.start}" ${i > 0 ? 'readonly' : ''}
              oninput="onStartEdit(${s.id},this)">
          </div>
        </div>
        <div class="field">
          <label>終了時刻</label>
          <div class="cell end-cell" id="end-${s.id}">${endMin !== null ? minToStr(endMin) : '—'}</div>
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>ケア時間（分）</label>
          <div class="cell">
            <input type="text" inputmode="numeric"
              value="${s.elapsed}" oninput="onElapsedInput(${s.id},this)">
          </div>
        </div>
        <div class="field">
          <label>インターバル(分)</label>
          <div class="cell">
            <input type="text" inputmode="numeric" placeholder="5"
              value="${s.interval}" oninput="onIntervalInput(${s.id},this)">
          </div>
        </div>
      </div>
      <div class="session-footer">
        <button class="btn-delete" onclick="removeSession(${s.id})">削除</button>
      </div>
    `;
    container.appendChild(div);
  });
}

function clearAll() {
  elapsedHistory = [];
  sessions = [];
  numPeople = 0;
  globalStart = '';
  nextId = 1;
  document.getElementById('numPeople').value = '';
  document.getElementById('startTime').value = '';
  render();
}
</script>
</body>
</html>
